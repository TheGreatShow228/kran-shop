<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Контакты — КРАН</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/modal.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <!-- Хедер -->

        <main>
            <div class="container">
                <div class="elements-menu-catalog">
                    <span class="inline"><a href="index.html">Главная</a></span>
                    <span class="delimiter"></span>
                    <span class="inline">Контакты</span>
                </div>

                <div class="block-title">
                    <div class="block-title_text">Контакты</div>
                    <div class="block-title_icon"></div>
                </div>

                <div class="contacts-container">
                    <div class="contacts-info">
                        <div class="contact-block">
                            <h3>Контакт-центр</h3>
                            <p>Ежедневно с 8:00 до 01:00</p>
                            <p><a href="tel:88004558090" class="contact-phone">8 800 455 80 90</a></p>
                            <p><a href="mailto:krandv@yandex.ru" class="contact-email">krandv@yandex.ru</a></p>
                        </div>
                        <div class="contact-block">
                            <h3>Обратный звонок</h3>
                            <p>Оставьте номер и мы вам перезвоним</p>
                            <button class="callback-open contact-callback-btn">Перезвоните мне</button>
                        </div>
                        <div class="contact-block">
                            <h3>Мессенджеры</h3>
                            <p>Ежедневно с 8:00 до 01:00</p>
                            <div class="messengers">
                                <a href="#"><img src="img/WhatsApp_black.png" alt="WhatsApp"></a>
                                <a href="#"><img src="img/Instagram_black.png" alt="Instagram"></a>
                            </div>
                        </div>
                    </div>

                    <div class="contact-form">
                        <h3>Есть вопросы?</h3>
                        <form>
                            <input type="text" placeholder="Имя" required>
                            <input type="tel" placeholder="Телефон" required>
                            <input type="email" placeholder="Эл. почта" required>
                            <textarea placeholder="Текст вопроса" rows="4"></textarea>
                            <button type="submit" class="submit-button">Отправить</button>
                            <div class="personal-data">Нажимая на кнопку, я даю согласие на обработку <a href="#">персональных данных</a></div>
                        </form>
                    </div>
                </div>
            </div>
        </main>

        <!-- Футер -->
    </div>
    <script src="js/modal.js"></script>
</body>
</html>

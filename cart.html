<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Корзина — КРАН</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/modal.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <!-- Хедер -->

        <main>
            <div class="container">
                <div class="elements-menu-catalog">
                    <span class="inline"><a href="index.html">Главная</a></span>
                    <span class="delimiter"></span>
                    <span class="inline">Корзина</span>
                </div>

                <div class="block-title">
                    <div class="block-title_text">Корзина</div>
                </div>

                <div class="cart-container">
                    <div class="cart-items">
                        <table class="cart-table">
                            <thead>
                                <tr><th>Наименование</th><th>Цена</th><th>Кол-во</th><th>Итого</th></tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>Полотенцесушитель электрический Terminus Классик П8, Хром, 70х80</td>
                                    <td>640 ₽</td>
                                    <td><div class="cart-quantity"><button>-</button><span>1</span><button>+</button></div></td>
                                    <td>640 ₽</td>
                                </tr>
                                <!-- ещё товары -->
                            </tbody>
                        </table>
                    </div>

                    <div class="cart-sidebar">
                        <div class="cart-summary">
                            <h3>Способ доставки</h3>
                            <label><input type="radio" name="delivery" checked> Самовывоз (Москва, ул. Льва Толстого, 10)</label>
                            <label><input type="radio" name="delivery"> Доставка — 500 ₽</label>
                            <input type="text" placeholder="Город, улица, дом, офис/квартира">

                            <h3>Способ оплаты</h3>
                            <label><input type="radio" name="payment"> Оплата онлайн</label>
                            <label><input type="radio" name="payment"> Оплата наличными или картой курьеру</label>
                            <label><input type="radio" name="payment"> Кредит</label>

                            <h3>Личные данные</h3>
                            <input type="text" placeholder="Ф.И.О.">
                            <input type="email" placeholder="Эл. почта">
                            <input type="tel" placeholder="Телефон">
                            <textarea placeholder="Комментарий"></textarea>

                            <button class="submit-button">Оформить заказ</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Футер -->
    </div>
    <script src="js/cart.js"></script>
</body>
</html>
